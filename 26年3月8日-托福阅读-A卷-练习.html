<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
  <meta name="robots" content="noindex, nofollow">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>26年3月8日 托福阅读 A卷</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    font-family: "PT Sans", "Microsoft YaHei", sans-serif;
    background: #f5f6f8; color: #1a1a1a; line-height: 1.7;
    padding: 20px;
  }
  .container { max-width: 1000px; margin: 0 auto; }
  h1 { font-size: 24px; margin-bottom: 8px; color: #2c3e50; }
  .subtitle { color: #7f8c8d; font-size: 14px; margin-bottom: 20px; }

  .timer-bar {
    position: sticky; top: 0; z-index: 100; background: #fff;
    border-radius: 12px; box-shadow: 0 2px 12px rgba(0,0,0,0.08);
    padding: 16px 20px; margin-bottom: 20px;
    display: flex; align-items: center; justify-content: space-between;
  }
  .timer-info { display: flex; align-items: center; gap: 16px; }
  .timer-phase { font-size: 14px; color: #7f8c8d; }
  .timer-phase strong { color: #2c3e50; font-size: 16px; }
  .timer-display {
    font-size: 32px; font-weight: 700; font-variant-numeric: tabular-nums;
    color: #27ae60; font-family: "Courier New", monospace;
  }
  .timer-display.warning { color: #e67e22; }
  .timer-display.danger { color: #e74c3c; }
  .timer-controls button {
    border: none; border-radius: 8px; padding: 8px 16px; font-size: 14px;
    cursor: pointer; margin-left: 8px; font-family: inherit;
  }
  .btn-secondary { background: #ecf0f1; color: #2c3e50; }
  .btn-danger { background: #e74c3c; color: #fff; }

  .phase-progress { display: flex; gap: 4px; margin-bottom: 20px; }
  .phase-dot { flex: 1; height: 6px; border-radius: 3px; background: #ddd; }
  .phase-dot.active { background: #3498db; }
  .phase-dot.done { background: #27ae60; }

  .phase-wrapper { display: block; }
  #phase-m2 { display: none; }

  .section {
    background: #fff; border-radius: 12px; padding: 24px; margin-bottom: 20px;
    box-shadow: 0 2px 8px rgba(0,0,0,0.05);
  }
  .section h2 {
    font-size: 19px; color: #2c3e50; margin-bottom: 16px;
    border-left: 4px solid #3498db; padding-left: 12px;
  }

  .cloze-passage {
    background: #f8f9fb; border-radius: 8px; padding: 20px 20px;
    font-size: 16px; margin-bottom: 20px; line-height: 2.4;
    word-break: normal; overflow-wrap: normal;
  }
  .blank-group {
    display: inline;
    white-space: nowrap;
    margin: 0 2px;
  }
  .letter-box {
    display: inline-block; width: 14px; height: 22px; line-height: 22px;
    border: none;
    text-align: center; font-size: 16px; font-family: inherit;
    outline: none; color: #2c3e50;
    background: #e8ecf0;
    cursor: text; user-select: none; margin: 0; padding: 0;
    vertical-align: baseline; position: relative;
    border-radius: 2px;
  }
  .letter-box::after {
    content: '_';
    color: #333;
    font-size: 16px; font-weight: 700;
    position: absolute; left: 50%; top: 50%;
    transform: translate(-50%, -50%);
    pointer-events: none;
  }
  .letter-box.filled::after,
  .letter-box:focus::after {
    content: none;
  }
  .letter-box:focus {
    background: #d6e4f0; outline: 2px solid #3498db; outline-offset: -1px;
  }
  .letter-box.filled {
    background: #d4edda; color: #27ae60; font-weight: 600;
  }
  .letter-box.locked { background: #e8ecf0; color: #27ae60; }
  .letter-box.correct-letter { background: #d4edda; color: #27ae60; font-weight: 600; }
  .letter-box.wrong-letter { background: #fdecea; color: #e74c3c; font-weight: 600; }

  .reading-group {
    margin-bottom: 24px; padding-bottom: 16px;
    border-bottom: 1px solid #ecf0f1;
  }
  .reading-group:last-child { border-bottom: none; }
  .rg-heading {
    font-size: 15px; font-weight: 600; color: #2c3e50;
    margin-bottom: 10px; padding: 4px 10px;
    background: #eef5fb; border-radius: 6px; display: inline-block;
  }
  .rg-title {
    font-size: 16px; font-weight: 700; color: #2c3e50;
    margin-bottom: 8px; padding-bottom: 6px;
    border-bottom: 2px solid #3498db;
  }
  .rg-body {
    display: grid; grid-template-columns: 1fr 1fr; gap: 20px;
    align-items: start;
  }
  .passage-col {
    background: #f8f9fb; border-radius: 8px; padding: 16px;
    font-size: 14px;
    position: sticky; top: 100px;
    max-height: calc(100vh - 140px);
    overflow-y: auto;
  }
  .passage-col img { max-width: 100%; border-radius: 4px; }
    .passage-col mark, .q-stem mark {
    background: #e3f2fd; padding: 1px 4px; border-radius: 3px;
    font-weight: 600; color: #0d47a1;
  }
  .passage-col mark.mark-purpose, .q-stem mark.mark-purpose {
    background: #e8f5e9; color: #1b5e20;
  }
  .insert-sentence {
    display: block;
    font-size: 16px;
    font-weight: 700;
    color: #2c3e50;
    background: #f8f9fb;
    border-left: 4px solid #3498db;
    padding: 12px 16px;
    margin: 10px 0;
    border-radius: 6px;
    line-height: 1.6;
  }
  .questions-col { padding: 0 4px; }

  .question { margin-bottom: 18px; padding-bottom: 12px; border-bottom: 1px solid #f0f0f0; }
  .question:last-child { border-bottom: none; }
  .q-number {
    display: inline-block; background: #3498db; color: #fff;
    font-size: 12px; font-weight: 700; padding: 2px 8px; border-radius: 10px;
    margin-right: 6px; vertical-align: middle;
  }
  .q-stem { font-size: 14px; margin-bottom: 8px; font-weight: 500; display: inline; }
  .q-options label {
    display: block; padding: 7px 12px; margin-bottom: 6px;
    border: 1px solid #e0e0e0; border-radius: 8px; cursor: pointer;
    transition: all 0.2s; font-size: 13px;
  }
  .q-options label:hover { background: #f0f8ff; border-color: #3498db; }
  .q-options input[type=radio] { margin-right: 8px; }
  .q-options label.selected { background: #e3f2fd; border-color: #3498db; font-weight: 600; }
  .question.graded label { cursor: default; }
  .question.correct label.user-choice { background: #e8f5e9; border-color: #27ae60; }
  .question.wrong label.user-choice { background: #fdecea; border-color: #e74c3c; }

  .result-box {
    display: none; background: #fff; border-radius: 12px; padding: 24px;
    margin-bottom: 20px; text-align: center; box-shadow: 0 2px 12px rgba(0,0,0,0.08);
  }
  .result-box.show { display: block; }
  .result-score { font-size: 48px; font-weight: 700; color: #3498db; }
  .result-detail { font-size: 16px; color: #34495e; margin-top: 8px; }
  .result-note { font-size: 13px; color: #95a5a6; margin-top: 12px; }

  .time-up-banner {
    display: none; background: #e74c3c; color: #fff; text-align: center;
    padding: 12px; border-radius: 8px; margin-bottom: 16px; font-size: 15px;
  }
  .time-up-banner.show { display: block; }

  .submit-bar { position: sticky; bottom: 20px; text-align: center; margin-top: 20px; }
  .submit-bar button {
    background: #27ae60; color: #fff; border: none; border-radius: 24px;
    padding: 14px 48px; font-size: 16px; cursor: pointer; font-family: inherit;
    box-shadow: 0 4px 12px rgba(39,174,96,0.3);
  }
  .submit-bar button:hover { background: #219a52; }

  .name-overlay {
    position: fixed; top: 0; left: 0; width: 100%; height: 100%;
    background: rgba(0,0,0,0.6); z-index: 1000;
    display: flex; align-items: center; justify-content: center;
  }
  .name-dialog {
    background: #fff; border-radius: 16px; padding: 36px 40px;
    text-align: center; box-shadow: 0 8px 32px rgba(0,0,0,0.2);
    max-width: 400px; width: 90%;
  }
  .name-dialog h2 { font-size: 20px; color: #2c3e50; margin-bottom: 8px; }
  .name-dialog p { color: #7f8c8d; font-size: 14px; margin-bottom: 20px; }
  .name-dialog input {
    width: 100%; padding: 12px 16px; font-size: 16px;
    border: 2px solid #dce1e6; border-radius: 10px; outline: none;
    font-family: inherit; text-align: center;
    transition: border-color 0.2s;
  }
  .name-dialog input:focus { border-color: #3498db; }
  .name-dialog .name-error {
    color: #e74c3c; font-size: 13px; margin-top: 8px; display: none;
  }
  .name-dialog button {
    margin-top: 20px; background: #3498db; color: #fff;
    border: none; border-radius: 24px; padding: 12px 40px;
    font-size: 16px; cursor: pointer; font-family: inherit;
  }
  .name-dialog button:hover { background: #2980b9; }
  .student-name-tag {
    background: #eef5fb; color: #3498db; padding: 4px 14px;
    border-radius: 16px; font-size: 14px; font-weight: 600;
  }

  @media (max-width: 768px) {
    .rg-body { grid-template-columns: 1fr; }
    .passage-col { max-height: none; }
  }
</style>
</head>
<body>
<div class="container">
  <h1 id="doc-title"></h1>
  <div class="subtitle">托福阅读练习 · 带倒计时功能</div>

  <div class="name-overlay" id="name-overlay">
    <div class="name-dialog">
      <h2>请输入你的姓名</h2>
      <p>输入姓名后开始计时</p>
      <input type="text" id="student-name-input" placeholder="输入姓名" autocomplete="off">
      <div class="name-error" id="name-error">请输入姓名后再开始</div>
      <button onclick="confirmName()">开始练习</button>
    </div>
  </div>

  <div class="timer-bar">
    <div class="timer-info">
      <span class="student-name-tag" id="student-name-tag"></span>
      <div class="timer-phase">当前阶段：<strong id="phase-name">M1</strong></div>
      <div class="timer-display" id="timer">18:00</div>
    </div>
    <div class="timer-controls">
      <button class="btn-secondary" id="pause-btn" onclick="togglePause()">暂停</button>
      <button class="btn-danger" id="reset-btn" onclick="resetTimer()">重置</button>
    </div>
  </div>

  <div class="phase-progress">
    <div class="phase-dot active" id="dot-m1"></div>
    <div class="phase-dot" id="dot-m2"></div>
  </div>

  <div class="time-up-banner" id="time-up">时间到！本阶段已自动锁定，请进入下一阶段。</div>

  <div id="content"></div>

  <div class="result-box" id="result">
    <div class="result-score" id="result-score">0%</div>
    <div class="result-detail" id="result-detail"></div>
    <div class="result-note">＊ 本练习不显示正确答案，仅显示作答对错与正确率</div>
  </div>

  <div class="submit-bar" id="submit-bar-m1">
    <button id="submit-btn" onclick="submitPhase('M1')">提交 M1 并进入 M2+</button>
  </div>
  <div class="submit-bar" id="submit-bar-m2" style="display:none">
    <button onclick="submitAll()">提交 M2+ 并查看结果</button>
  </div>
</div>

"}],"answer": "C"},{"stem": "25. What is the meaning of Daniel Rivero's advice to students?","options": [{"label": "A","text": "Creative thinking begins when things go wrong."},{"label": "B","text": "It is good to leave home, but come back often."},{"label": "C","text": "Poor choices can stifle innovation if you are not careful."},{"label": "D","text": "Dream big and do not let anyone stand in your way."}],"answer": "A"}]}]},{"name": "3月8日 A卷 M1 学术阅读 Q26-30","type": "reading-groups","groups": [{"type": "text","title": "A Unique Advantage of Spicy Cuisine","passage": "Are you fond of spicy food? Spices have been used for thousands of years to enhance the flavor of food, originally in cultures where spice plants were native to the area. Today, spice use is widespread across cultures, though certain spices are more prevalent in some cuisines. Indeed, scientists have suggested that hot-climate cuisines feature a greater amount and variety of spices. For example, a recent study found that the number of different spices was much greater in traditional recipes from Southeast Asian countries than in those from northern Europe.<br><br>Why do hot-climate cuisines feature more spices? Some believe that spice consumption is related to cultural preferences. While culture certainly plays a part, scientists have recently suggested that the antimicrobial properties of spices, which prevent the growth of dangerous foodborne microorganisms, ensured their widespread use in hot climates. In such climates, food spoilage was a concern before the availability of refrigeration. Spices with greater antimicrobial or antibacterial properties, such as allspice, cinnamon, cumin, garlic, and onions, were frequently featured in the traditional recipes of hot-climate cuisines and in different combinations. Scientists concluded that food safety  <mark class=\"mark-vocab\">precipitated</mark>  the use of many and multiple spices in hot regions.","heading": null,"questions": [{"stem": "What is the purpose of the passage?","options": [{"label": "A","text": "To share research findings related to spice use"},{"label": "B","text": "To promote the widespread use of specific spices"},{"label": "C","text": "To describe an outdated theory about spice use"},{"label": "D","text": "To contrast traditional and contemporary spice consumption"}],"answer": "A"},{"stem": "27. What data were likely collected for the study?","options": [{"label": "A","text": "The number of spices used in a variety of countries"},{"label": "B","text": "The types of microorganisms on different spices"},{"label": "C","text": "The food preferences of customers at traditional restaurants"},{"label": "D","text": "The number of traditional Southeast Asian recipes used in Europe"}],"answer": "A"},{"stem": "28. According to the passage, what is suggested about spice usage in food?","options": [{"label": "A","text": "It can conceal the odor of spoiled food."},{"label": "B","text": "It has caused a rise in demand for native plants."},{"label": "C","text": "It may prevent bacteria on food from developing."},{"label": "D","text": "It has decreased substantially in Southeast Asia."}],"answer": "C"},{"stem": "29. All of the following are mentioned about spices EXCEPT:","options": [{"label": "A","text": "Spices are derived from plant products."},{"label": "B","text": "Spices require refrigeration to maintain their function."},{"label": "C","text": "Spice usage is associated with cultural practices."},{"label": "D","text": "Spice usage varies considerably by cuisine."}],"answer": "B"},{"stem": "30. The word <mark class=\"mark-vocab\">\"precipitated\"</mark> in the passage is closest in meaning to:","options": [{"label": "A","text": "threw"},{"label": "B","text": "separated"},{"label": "C","text": "caused"},{"label": "D","text": "rained"}],"answer": "C"}]}]},{"name": "3月8日 A卷 M1 学术阅读 Q31-35","type": "reading-groups","groups": [{"type": "text","title": "The Dynamics of Hollywood's Golden Age","passage": "Hollywood's Golden Age, from the 1920s to the 1960s, was a transformative period in cinema history. Under the studio system, major companies like RKO controlled film production, creating an efficient assembly-line process that produced stars such as Humphrey Bogart and Katharine Hepburn. While this system ensured a steady output of films, it often limited creative freedom for directors and actors tied to restrictive contracts. Yet this very constraint led to unexpected innovation as filmmakers sought new ways to tell  <mark class=\"mark-vocab\">compelling</mark>  stories within set boundaries.<br><br>A pivotal change during this era was the introduction of sound, forever altering cinematic storytelling. Silent film stars had to adapt or risk obsolescence, while new genres like musicals capitalized on sound technology's possibilities. This shift pushed directors to experiment with narrative structures, often blurring the lines between genres to captivate audiences.<br><br>The decline of the studio system began with a 1948 Supreme Court ruling that dismantled studios' monopolies over theaters. This ruling opened the door for independent filmmakers, whose diverse and unconventional stories began gaining traction in theaters. However, the legacy of the studio system's efficiency and star-making machinery still influences Hollywood's operations today.","heading": null,"questions": [{"stem": "31. Which aspect of the studio system encouraged filmmakers to innovate?","options": [{"label": "A","text": "The demand for more silent films"},{"label": "B","text": "The freedom to create experimental films"},{"label": "C","text": "The inefficiency of film production"},{"label": "D","text": "The boundaries imposed by restrictive contracts"}],"answer": "D"},{"stem": "” in the passage is closest in meaning to","options": [{"label": "A","text": "modern"},{"label": "B","text": "astonishing"},{"label": "C","text": "fascinating"},{"label": "D","text": "complex"}],"answer": "C"},{"stem": "33. Why does the author mention <mark class=\"mark-purpose\">the introduction of sound in films</mark>?","options": [{"label": "A","text": "To highlight a development that led to new, creative narrative techniques"},{"label": "B","text": "To emphasize the former popularity of silent films"},{"label": "C","text": "To discuss how sound renewed the careers of silent film stars"},{"label": "D","text": "To identify the event that started the decline of the studio system"}],"answer": "A"},{"stem": "34. What inference can be made about the 1948 Supreme Court ruling?","options": [{"label": "A","text": "It led to a temporary increase in studio profits."},{"label": "B","text": "It allowed independent films to be seen and become popular."},{"label": "C","text": "It caused studios to develop more large-scale musical productions."},{"label": "D","text": "It had no effect on Hollywood's operations."}],"answer": "B"},{"stem": "35. What does the passage imply about the Hollywood film industry today?","options": [{"label": "A","text": "Modern studios have completely abandoned all practices from the Golden Age period."},{"label": "B","text": "Contemporary films commonly use the storytelling techniques developed during the 1920s-1960s."},{"label": "C","text": "Independent filmmakers have entirely replaced the studio system's influence on cinema."},{"label": "D","text": "The assembly-line process of the studio system still impacts current Hollywood operations."}],"answer": "D"}]}]},{"name": "3月8日 A卷 M2+ 单词填空","type": "cloze","passages": [{"title": "Q1-10","text": "The Renaissance was a period of cultural rebirth in Europe, spanning the fourteenth to seventeenth centuries. A vib_ _ _ _ period o_ cultural, arti_ _ _ _, and intell_ _ _ _ _ _ revival, t_ _ Renaissance mar_ _ _ a ren_ _ _ _ interest i_  classical liter_ _ _ _ _  , art, a_ _ science. The Renaissance had a profound historical impact, serving as a bridge between the Middle Ages and the modern era. It sparked a cultural awakening that emphasized humanism, individual achievement, and secular learning, which reshaped European thought and institutions.","answers": ["vibrant","of","artistic","intellectual","the","marked","renewed","in","literature","and"]}]},{"name": "3月8日 A卷 M2+ 学术阅读","type": "reading-groups","groups": [{"type": "text","title": "Biochemical Systems Theory: Challenges and Implications","passage": "Biochemical systems theory, a potent framework for simulating biochemical processes,  <mark class=\"mark-vocab\">hinges</mark>  on mathematical models for predicting the interactions of molecules within cells. The theory's ability to predict metabolic pathways regulated by enzymes (proteins facilitating and managing chemical reactions) offers significant potential for advancements in biotechnology. However, constructing accurate models demands a profound grasp of biology and mathematics, posing significant challenges to researchers.<br><br>While the theory enables simulations of complex cellular behavior, it is reliant on precise data inputs. Erroneous data can skew predictions, underscoring the delicate balance between mathematical precision and biological variability. That interplay raises questions about the theory's reliability, particularly in drug development, where predicting compounds' effects on metabolic pathways is crucial yet fraught with uncertainty.<br><br>Furthermore, biochemical systems theory has sparked debates over its ethical implications. <strong>[A]</strong>By scrutinizing biological systems, researchers identify processes ripe for intervention. <strong>[B]</strong>Yet this provokes concerns about the manipulation of life at a granular level, including the possibility that interventions could have unintended consequences or adversely affect future generations. <strong>[C]</strong>As the field evolves, ethical discussions are as dynamic as the biochemical networks themselves. <strong>[D]</strong>","heading": null,"questions": [{"stem": "”  in the passage is closest in me let currentPhase = 'M1';
let phaseTimers = DATA.timers;
let remaining = phaseTimers['M1'] * 60;
let timerInterval = null;
let paused = false;
let phaseSubmitted = { M1: false, M2: false };
let globalQNumber = 0;
let studentName = '';
let timerStarted = false;

function confirmName() {
  const input = document.getElementById('student-name-input');
  const name = input.value.trim();
  if (!name) {
    document.getElementById('name-error').style.display = 'block';
    return;
  }
  studentName = name;
  document.getElementById('name-overlay').style.display = 'none';
  document.getElementById('student-name-tag').textContent = '👤 ' + name;
  timerStarted = true;
  updateTimerDisplay();
  startTimer();
}

function renderContent() {
  document.getElementById('doc-title').textContent = DATA.title;
  const content = document.getElementById('content');
  content.innerHTML = '';

  const m1Wrapper = document.createElement('div');
  m1Wrapper.id = 'phase-m1';
  m1Wrapper.className = 'phase-wrapper';
  const m2Wrapper = document.createElement('div');
  m2Wrapper.id = 'phase-m2';
  m2Wrapper.className = 'phase-wrapper';

  DATA.sections.forEach((sec, si) => {
    const isM2 = sec.name.includes('M2');
    const sectionEl = document.createElement('div');
    sectionEl.className = 'section';

    const h2 = document.createElement('h2');
    h2.textContent = sec.name;
    sectionEl.appendChild(h2);

    if (sec.type === 'cloze') {
      sec.passages.forEach((p, pi) => {
        const hp = document.createElement('h3');
        hp.textContent = p.title;
        hp.style.cssText = 'font-size:15px;color:#34495e;margin:12px 0 6px;';
        sectionEl.appendChild(hp);
        const div = document.createElement('div');
        div.className = 'cloze-passage';
        div.dataset.section = si;
        div.dataset.pindex = pi;
        div.innerHTML = renderCloze(p.text, isM2);
        sectionEl.appendChild(div);
      });
    } else if (sec.type === 'reading-groups') {
      sec.groups.forEach((grp, gi) => {
        const rg = document.createElement('div');
        rg.className = 'reading-group';

        if (grp.heading) {
          const hd = document.createElement('div');
          hd.className = 'rg-heading';
          hd.textContent = grp.heading.replace(/\s+/g, ' ');
          rg.appendChild(hd);
        }
        if (grp.title) {
          const titleEl = document.createElement('div');
          titleEl.className = 'rg-title';
          titleEl.textContent = grp.title;
          rg.appendChild(titleEl);
        }

        const bodyWrap = document.createElement('div');
        bodyWrap.className = 'rg-body';

        const left = document.createElement('div');
        left.className = 'passage-col';
        if (grp.type === 'image' && grp.image) {
          const img = document.createElement('img');
          img.src = grp.image; img.alt = '阅读材料';
          left.appendChild(img);
        } else if (grp.passage) {
          left.innerHTML = grp.passage;
        }

        const right = document.createElement('div');
        right.className = 'questions-col';
        grp.questions.forEach((q, qi) => {
          globalQNumber++;
          const qEl = document.createElement('div');
          qEl.className = 'question';
          qEl.dataset.section = si;
          qEl.dataset.group = gi;
          qEl.dataset.qindex = qi;

          const stemWrap = document.createElement('div');
          const qNum = document.createElement('span');
          qNum.className = 'q-number';
          qNum.textContent = globalQNumber;
          stemWrap.appendChild(qNum);
          const stem = document.createElement('span');
          stem.className = 'q-stem';
          stem.innerHTML = q.stem;
          stemWrap.appendChild(stem);
          qEl.appendChild(stemWrap);

          const opts = document.createElement('div');
          opts.className = 'q-options';
          q.options.forEach(o => {
            const label = document.createElement('label');
            const radio = document.createElement('input');
            radio.type = 'radio';
            radio.name = `q-${si}-${gi}-${qi}`;
            radio.value = o.label;
            radio.addEventListener('change', () => {
              if (phaseSubmitted[currentPhase]) return;
              opts.querySelectorAll('label').forEach(l => l.classList.remove('selected'));
              label.classList.add('selected');
            });
            label.appendChild(radio);
            label.appendChild(document.createTextNode(' ' + o.label + '. ' + o.text));
            opts.appendChild(label);
          });
          qEl.appendChild(opts);
          right.appendChild(qEl);
        });

        bodyWrap.appendChild(left);
        bodyWrap.appendChild(right);
        rg.appendChild(bodyWrap);
        sectionEl.appendChild(rg);
      });
    }

    (isM2 ? m2Wrapper : m1Wrapper).appendChild(sectionEl);
  });

  content.appendChild(m1Wrapper);
  content.appendChild(m2Wrapper);

  bindClozeEvents();
  initPhases();
}

function initPhases() {
  document.getElementById('phase-name').textContent = 'M1';
  document.getElementById('dot-m1').className = 'phase-dot active';
  document.getElementById('dot-m2').className = 'phase-dot';
  document.getElementById('submit-bar-m2').style.display = 'none';
}

function renderCloze(text, isM2) {
  let normalized = text.replace(/\s+/g, ' ').trim();
  return normalized.replace(/([a-zA-Z]?)\s*((?:_\s*){1,20})/g, (match, prefix, blanksSection) => {
    const count = (blanksSection.match(/_/g) || []).length;
    let boxes = '';
    for (let i = 0; i < count; i++) {
      boxes += `<span class="letter-box" tabindex="0" data-m2="${isM2}"></span>`;
    }
    const pre = prefix && /[a-zA-Z]/.test(prefix) ? prefix : '';
    return pre + '<span class="blank-group">' + boxes + '</span>';
  });
}

function bindClozeEvents() {
  const boxes = document.querySelectorAll('.letter-box');
  boxes.forEach((box, idx) => {
    box.addEventListener('focus', () => box.classList.add('focused'));
    box.addEventListener('blur', () => box.classList.remove('focused'));

    box.addEventListener('keydown', (e) => {
      e.preventDefault();
      e.stopPropagation();

      if (phaseSubmitted['M1'] && box.dataset.m2 === 'false') return;
      if (phaseSubmitted['M2'] && box.dataset.m2 === 'true') return;

      const k = e.key;
      if (/^[a-zA-Z]$/.test(k)) {
        box.textContent = k.toLowerCase();
        box.classList.add('filled');
        if (idx < boxes.length - 1) {
          boxes[idx + 1].focus();
        }
      } else if (k === 'Backspace') {
        box.textContent = '';
        box.classList.remove('filled');
        if (idx > 0) {
          boxes[idx - 1].focus();
        }
      } else if (k === 'ArrowLeft' && idx > 0) {
        boxes[idx - 1].focus();
      } else if (k === 'ArrowRight' && idx < boxes.length - 1) {
        boxes[idx + 1].focus();
      }
    });

    box.addEventListener('contextmenu', (e) => e.preventDefault());
    box.addEventListener('paste', (e) => {
      e.preventDefault();
      const text = (e.clipboardData || window.clipboardData).getData('text');
      const letters = text.replace(/[^a-zA-Z]/g, '').split('').slice(0, 10);
      letters.forEach((letter, i) => {
        const target = boxes[idx + i];
        if (target) {
          target.textContent = letter.toLowerCase();
          target.classList.add('filled');
          if (i === letters.length - 1) target.focus();
        }
      });
    });
  });
}

function startTimer() {
  if (!timerStarted) return;
  if (timerInterval) clearInterval(timerInterval);
  timerInterval = setInterval(() => {
    if (paused) return;
    remaining--;
    updateTimerDisplay();
    if (remaining <= 0) onTimeUp();
  }, 1000);
}

function updateTimerDisplay() {
  const m = Math.floor(remaining / 60);
  const s = Math.floor(remaining % 60);
  const display = document.getElementById('timer');
  display.textContent = `${String(m).padStart(2,'0')}:${String(s).padStart(2,'0')}`;
  display.className = 'timer-display' + (remaining <= 60 ? ' danger' : remaining <= 300 ? ' warning' : '');
}

function onTimeUp() {
  clearInterval(timerInterval);
  if (currentPhase === 'M1' && !phaseSubmitted.M1) {
    submitPhase('M1');
  } else if (currentPhase === 'M2' && !phaseSubmitted.M2) {
    submitAll();
  }
}

function lockPhase(phase) {
  document.querySelectorAll(`#phase-${phase.toLowerCase()} input[type=radio]`).forEach(input => input.disabled = true);
  document.querySelectorAll(`#phase-${phase.toLowerCase()} .letter-box`).forEach(box => box.classList.add('locked'));
}

function togglePause() {
  paused = !paused;
  document.getElementById('pause-btn').textContent = paused ? '继续' : '暂停';
}

function resetTimer() {
  clearInterval(timerInterval);
  paused = false;
  document.getElementById('pause-btn').textContent = '暂停';
  remaining = phaseTimers[currentPhase] * 60;
  updateTimerDisplay();
  startTimer();
}

function submitPhase(phase) {
  clearInterval(timerInterval);
  phaseSubmitted[phase] = true;
  lockPhase(phase);

  if (phase === 'M1') {
    document.getElementById('phase-m2').style.display = 'block';
    currentPhase = 'M2';
    remaining = phaseTimers['M2'] * 60;
    document.getElementById('phase-name').textContent = 'M2+';
    document.getElementById('dot-m1').className = 'phase-dot done';
    document.getElementById('dot-m2').className = 'phase-dot active';
    document.getElementById('submit-bar-m1').style.display = 'none';
    document.getElementById('submit-bar-m2').style.display = 'block';
    document.getElementById('time-up').classList.remove('show');
    updateTimerDisplay();
    startTimer();
    setTimeout(() => document.getElementById('phase-m2').scrollIntoView({ behavior: 'smooth' }), 100);
  }
}

function submitAll() {
  clearInterval(timerInterval);
  phaseSubmitted.M2 = true;
  lockPhase('M1');
  lockPhase('M2');

  let readingTotal = 0, readingCorrect = 0;
  let clozeTotal = 0, clozeCorrect = 0;

  DATA.sections.forEach((sec, si) => {
    if (sec.type !== 'reading-groups') return;
    sec.groups.forEach((grp, gi) => {
      grp.questions.forEach((q, qi) => {
        readingTotal++;
        const radios = document.querySelectorAll(`input[name="q-${si}-${gi}-${qi}"]`);
        let userChoice = null;
        radios.forEach(r => { if (r.checked) userChoice = r.value; });
        const qEl = document.querySelector(`.question[data-section="${si}"][data-group="${gi}"][data-qindex="${qi}"]`);
        if (!qEl) return;
        qEl.classList.add('graded');
        if (userChoice) {
          const userLabel = qEl.querySelector(`label:has(input[value="${userChoice}"])`);
          if (userLabel) userLabel.classList.add('user-choice');
          if (q.answer && userChoice === q.answer) {
            readingCorrect++;
            qEl.classList.add('correct');
          } else if (q.answer) {
            qEl.classList.add('wrong');
          }
        }
      });
    });
  });

  DATA.sections.forEach((sec, si) => {
    if (sec.type !== 'cloze') return;
    sec.passages.forEach((p, pi) => {
      const passageEl = document.querySelector(`.cloze-passage[data-section="${si}"][data-pindex="${pi}"]`);
      if (!passageEl) return;
      const blankGroups = passageEl.querySelectorAll('.blank-group');
      const answers = p.answers || [];
      blankGroups.forEach((group, gi) => {
        clozeTotal++;
        const boxes = group.querySelectorAll('.letter-box');
        const userWord = Array.from(boxes).map(b => (b.textContent || '').trim().toLowerCase()).join('');
        const correctWord = (answers[gi] || '').toLowerCase();
        let isCorrect = userWord === correctWord && userWord.length > 0;
        if (isCorrect) clozeCorrect++;
        boxes.forEach(b => {
          b.classList.add(isCorrect ? 'correct-letter' : 'wrong-letter');
        });
      });
    });
  });

  const total = readingTotal + clozeTotal;
  const correct = readingCorrect + clozeCorrect;
  const rate = total > 0 ? Math.round(correct / total * 100) : 0;
  const readingRate = readingTotal > 0 ? Math.round(readingCorrect / readingTotal * 100) : 0;
  const clozeRate = clozeTotal > 0 ? Math.round(clozeCorrect / clozeTotal * 100) : 0;

  document.getElementById('result-score').textContent = rate + '%';
  document.getElementById('result-detail').innerHTML =
    `共 ${total} 题，答对 ${correct} 题<br>` +
    `<span style="font-size:14px;color:#7f8c8d">阅读 ${readingCorrect}/${readingTotal} (${readingRate}%) | 填空 ${clozeCorrect}/${clozeTotal} (${clozeRate}%)</span>`;
  document.getElementById('result').classList.add('show');
  document.getElementById('result').scrollIntoView({ behavior: 'smooth' });

  const BIN_ID = '6a4d3f08da38895dfe3c1bab';
  const ACCESS_KEY = '$2a$10$vflZLkxWC8EGBUUumIpmW.GYy5t4m0jsLIo/tIQqCuLQitGPnoHue';
  
  const elapsed = phaseTimers['M1']*60 + phaseTimers['M2']*60 - remaining;
  const mm = String(Math.floor(elapsed / 60)).padStart(2,'0');
  const ss = String(Math.floor(elapsed % 60)).padStart(2,'0');
  
  const record = {
    student: studentName || '未填姓名',
    set_name: DATA.title,
    total_rate: rate + '%',
    total_q: total,
    correct_q: correct,
    reading_q: readingTotal,
    reading_correct: readingCorrect,
    cloze_q: clozeTotal,
    cloze_correct: clozeCorrect,
    duration: mm + ':' + ss,
    submit_time: new Date().toLocaleString('zh-CN')
  };

  fetch(`https://api.jsonbin.io/v3/b/${BIN_ID}/latest`, {
    headers: { 'X-Access-Key': ACCESS_KEY }
  }).then(r => r.json()).then(data => {
    const records = data.record.records || [];
    records.push(record);
    return fetch(`https://api.jsonbin.io/v3/b/${BIN_ID}`, {
      method: 'PUT',
      headers: {
        'Content-Type': 'application/json',
        'X-Access-Key': ACCESS_KEY
      },
      body: JSON.stringify({ records: records })
    });
  }).then(r => r.json()).then(() => {
    const note = document.createElement('div');
    note.style.cssText = 'color:#27ae60;font-size:13px;margin-top:8px;';
    note.textContent = '✓ 成绩已自动提交';
    document.getElementById('result').appendChild(note);
  }).catch(() => {});
}

renderContent();
updateTimerDisplay();
</script>
